# API key secrets. Type must be extauth.solo.io/apikey.
# Revoke instantly by removing the 'access: allowed' label — no policy change needed:
#   kubectl label secret apikey-team-dev -n agentgateway-system access-
# Restore:
#   kubectl label secret apikey-team-dev -n agentgateway-system access=allowed
apiVersion: v1
kind: Secret
metadata:
  name: apikey-team-dev
  namespace: agentgateway-system
  labels:
    team: dev
    tier: standard
    access: allowed
type: extauth.solo.io/apikey
stringData:
  api-key: dev-key-abc123
---
apiVersion: v1
kind: Secret
metadata:
  name: apikey-team-ops
  namespace: agentgateway-system
  labels:
    team: ops
    tier: premium
    access: allowed
type: extauth.solo.io/apikey
stringData:
  api-key: ops-key-xyz789
