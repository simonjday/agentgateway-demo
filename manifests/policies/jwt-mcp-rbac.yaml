# Per-user MCP tool access via JWT claims.
# alice (sub=alice): read-only tools only (pods_list, namespaces_list, nodes_top)
# bob (sub=bob): full tool access (all 19 tools)
# Requires jwt-authn.yaml to be applied first.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: jwt-mcp-rbac
  namespace: agentgateway-system
spec:
  targetRefs:
  - group: agentgateway.dev
    kind: AgentgatewayBackend
    name: kubernetes-mcp
  backend:
    mcp:
      authorization:
        action: Allow
        policy:
          matchExpressions:
          - 'jwt.sub == "bob"'
          - 'jwt.sub == "alice" && (mcp.tool.name == "pods_list" || mcp.tool.name == "namespaces_list" || mcp.tool.name == "nodes_top")'
