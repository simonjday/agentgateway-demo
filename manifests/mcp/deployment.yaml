apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-mcp-server
  namespace: mcp
spec:
  selector:
    matchLabels:
      app: kubernetes-mcp-server
  template:
    metadata:
      labels:
        app: kubernetes-mcp-server
    spec:
      serviceAccountName: kubernetes-mcp-server
      containers:
      - name: kubernetes-mcp-server
        image: ghcr.io/containers/kubernetes-mcp-server:latest
        args: ["--port", "8080"]
        ports:
        - containerPort: 8080
